# ============================================================================
# AMR PREDICTION PROJECT CONFIGURATION FILE
# ============================================================================
# This YAML file contains all configurable parameters for the antimicrobial
# resistance prediction pipeline. Modify these values to customize the
# analysis for different antibiotics, organisms, or computational resources.
#
# Purpose: Centralized configuration for reproducibility and easy parameter tuning
# Date: 2025
# ============================================================================

# ----------------------------------------------------------------------------
# PROJECT METADATA
# ----------------------------------------------------------------------------
project:
  name: "AMR_Genomic_Project"
  description: "Machine learning-based antimicrobial resistance prediction using k-mer features"
  target_antibiotic: "gentamicin"  # Primary antibiotic for analysis
  organism: "Escherichia coli"  # Target organism
  model: "xgboost"  # ML model
  version: "M4-pro"

# ----------------------------------------------------------------------------
# DIRECTORY PATHS (Relative to project root)
# ----------------------------------------------------------------------------
# All paths use forward slashes for cross-platform compatibility
# Absolute paths or ~ (home directory) can also be used
#
# MULTI-ANTIBIOTIC ARCHITECTURE:
# Changing 'target_antibiotic' automatically creates isolated directory structures:
# - data/processed/{antibiotic}/matrix/
# - models/{antibiotic}/
# - results/{antibiotic}/
# - logs/{antibiotic}/
#
# Cookiecutter Data Science layout:
# - data/raw/raw_genomes/       — original, immutable genome assemblies
# - data/external/metadata/     — AMR phenotype labels
# - data/external/blast_db/     — third-party databases (CARD)
# - data/interim/               — intermediate transformations (k-mer DBs)
# - data/processed/             — final, canonical feature matrices
# - results/                    — all analysis outputs (replaces analysis_results/)
paths:
  # ── Global (shared across all antibiotics) ────────────────────────────────
  data_dir:         "data"
  raw_genomes_dir:  "data/raw/raw_genomes"              # Immutable genome assemblies
  metadata_file:    "data/external/metadata/genome_amr_matrix.csv"  # AMR phenotype labels
  kmc_outputs_dir:  "data/interim/global_kmc_outputs"   # KMC binary databases
  dir_global_exploration: "results/global_exploration"  # Global QC and validation outputs

  # ── Antibiotic-specific (resolved with {antibiotic} placeholder) ───────────
  matrix_dir:           "data/processed/{antibiotic}/matrix"  # Feature matrices & labels
  logs_dir:             "logs/{antibiotic}"                    # Processing logs
  models_dir:           "models/{antibiotic}"                  # Trained models
  analysis_results_dir: "results/{antibiotic}"                 # Analysis outputs

  # Standardised, numbered analysis sub-directories (created on demand by each script)
  # Sequentially numbered so output folders sort naturally and reproduce the pipeline order.
  dir_01_data_exploration:   "results/{antibiotic}/01_data_exploration"
  dir_02_matrix_qc:          "results/{antibiotic}/02_matrix_qc"
  dir_03_model_optimization: "results/{antibiotic}/03_model_optimization"
  dir_04_evaluation:         "results/{antibiotic}/04_evaluation"
  dir_05_explainability:     "results/{antibiotic}/05_explainability"

  # ── External tool paths (system-specific) ─────────────────────────────────
  kmc_bin:       "bin/bin/kmc"        # Relative to project root
  kmc_tools_bin: "bin/bin/kmc_tools"  # Relative to project root

# ----------------------------------------------------------------------------
# DATA PREPROCESSING PARAMETERS
# ----------------------------------------------------------------------------
preprocessing:
  # K-mer counting configuration
  k_length: 21  # K-mer length
  min_support: 5  # Minimum genomes a k-mer must appear in to be retained
  # Rationale: Filters out rare k-mers (likely errors or strain-specific)
  
  # Computational resources
  kmc_mem: 16  # Memory allocation for KMC (GB)
  threads: 10  # Number of CPU threads to use
  chunk_size: 200  # Genomes per matrix chunk (for RAM management)
  
  # Feature engineering
  encoding: "binary"  # Binary (presence/absence) or frequency-basedß
  # Binary is preferred for assembled genomes

# ----------------------------------------------------------------------------
# MACHINE LEARNING TRAINING PARAMETERS
# ----------------------------------------------------------------------------
training:
  # Data splitting (Scale-Invariant Fractional Method)
  random_seed: 42  # For reproducible train/test splits
  test_fraction: 0.20  # Fraction of total chunks reserved for testing (20%)
  validation_fraction: 0.2  # Fraction of training data for early stopping validation
  
  # Hyperparameter optimization
  n_trials: 25  # Number of Optuna optimization trials
  optuna_fraction: 0.2  # Fraction of training chunks loaded into RAM during Bayesian opt (25%)
  optimization_metric: "auc"  # Metric to optimize (auc, accuracy, f1)

# ----------------------------------------------------------------------------
# XGBOOST MODEL CONFIGURATION
# ----------------------------------------------------------------------------
xgboost_params:
  # Core parameters (fixed during training)
  objective: "binary:logistic"  # Binary classification
  eval_metric: "auc"  # Evaluation metric
  booster: "gbtree"  # Tree-based booster
  tree_method: "hist"  # Histogram-based algorithm (faster)
  device: "cpu"  # Computation device (cpu or cuda for GPU)
  verbosity: 1  # 0=silent, 1=warning, 2=info, 3=debug
  n_jobs: 10  # Parallel threads
  
  # Early stopping
  early_stopping_rounds: 50  # Stop if no improvement for N rounds

# ----------------------------------------------------------------------------
# OPTIMIZED HYPERPARAMETERS
# ----------------------------------------------------------------------------
# NOTE: Hyperparameters are now stored in antibiotic-specific config files:
# - config/config_ciprofloxacin.yaml
# - config/config_tetracycline.yaml
# - etc.
#
# These files are auto-generated by 04_optimization.py and contain:
# - Optimization metadata (date, ROC AUC, trials)
# - Fixed XGBoost parameters
# - Best hyperparameters from Optuna optimization
#
# This architecture enables parallel optimization for multiple antibiotics
# without conflicts.

# ----------------------------------------------------------------------------
# ANALYSIS PARAMETERS
# ----------------------------------------------------------------------------
analysis:
  top_n_features: 50  # Number of top features to extract for biological analysis

# ----------------------------------------------------------------------------
# BLAST ANNOTATION PARAMETERS (Step 08)
# ----------------------------------------------------------------------------
# Used by 08_blast_annotation.py (Python orchestrator) and
# 08_blast_pipeline.nf (Nextflow processes).
#
# CARD Local BLAST:
#   - card_db_dir / card_db_name point to a pre-built blastn database from the
#     Comprehensive Antibiotic Resistance Database (CARD).
#   - Build with: makeblastdb -in card.fna -dbtype nucl -out data/blast_db/card_nt/card
#
# NCBI Remote BLAST:
#   - Uses the NCBI blastn -remote flag. Requires an internet connection.
#   - No local database needed; queries are sent directly to NCBI servers.
blast:
  card_db_dir:  "data/external/blast_db/card_nt"  # Relative to project root (Cookiecutter: external)
  card_db_name: "card"                   # Base name of the blastn database
  evalue:       10                        # E-value threshold for reporting hits
  word_size:    11                        # Seed word size (11 is standard for short seqs)
  threads:      8                         # CPU threads for local BLAST only